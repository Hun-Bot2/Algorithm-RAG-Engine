name: Algorithm RAG Engine Pipeline

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  S3_BUCKET_NAME: hunbot-algo-rag-data
  FAISS_INDEX_PATH: indexes/faiss_leetcode
  ARTIFACT_PATH: artifacts

jobs:
  heavy-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download FAISS Index from S3
        run: |
          mkdir -p indexes/faiss_leetcode
          aws s3 cp s3://${{ env.S3_BUCKET_NAME }}/${{ env.FAISS_INDEX_PATH }} ./indexes/faiss_leetcode --recursive

      - name: Build Heavy Image
        run: |
          docker build --target heavy -t algo-heavy .

      - name: Run Heavy Job Container
        run: |
          mkdir -p artifacts
          docker run --rm \
            -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            -e LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }} \
            -v $(pwd)/artifacts:/app/artifacts \
            -v $(pwd)/indexes:/app/indexes \
            algo-heavy
        # Important: Added /app/indexes volume mount to fix 'Index not found' error

      - name: Upload Recommendation Map to S3
        run: |
          aws s3 sync ./artifacts s3://${{ env.S3_BUCKET_NAME }}/artifacts --delete

  light-job:
    needs: heavy-job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Artifact from S3
        run: |
          mkdir -p artifacts
          aws s3 cp s3://${{ env.S3_BUCKET_NAME }}/artifacts/recommendation_map.json ./artifacts/recommendation_map.json

      - name: Build Light Image
        run: |
          docker build --target light -t algo-light .

      - name: Run Light Bot Container
        run: |
          docker run --rm \
            -e SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }} \
            -v $(pwd)/artifacts:/app/artifacts:ro \
            algo-light