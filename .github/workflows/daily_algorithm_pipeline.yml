name: Algorithm RAG Engine Pipeline

on:
  # schedule disabled
  # schedule:
  #   - cron: '0 22 * * *'
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  S3_BUCKET_NAME: hunbot-algo-rag-data
  # S3 버킷 내 실제 경로와 일치하도록 수정 (NumPy index)
  NUMPY_INDEX_PATH: numpy_leetcode
  ARTIFACT_PATH: artifacts

jobs:
  heavy-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Add Login to GHCR step
      - name : Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Download NumPy Index from S3
        run: |
          mkdir -p indexes/numpy_leetcode
          aws s3 cp s3://${{ env.S3_BUCKET_NAME }}/${{ env.NUMPY_INDEX_PATH }}/ ./indexes/numpy_leetcode/ --recursive

      - name: Run Heavy Job via Compose
        run: |
          mkdir -p artifacts
          # Pull the latest heavy-job image
          docker compose pull heavy-job
          docker compose run --rm \
            -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            -e LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }} \
            heavy-job
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}

      - name: Upload Recommendation Map to S3
        run: |
          aws s3 sync ./artifacts s3://${{ env.S3_BUCKET_NAME }}/artifacts --delete

  light-job:
    needs: heavy-job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Artifact from S3
        run: |
          mkdir -p artifacts
          aws s3 cp s3://${{ env.S3_BUCKET_NAME }}/artifacts/recommendation_map.json ./artifacts/recommendation_map.json

      - name: Run Light Bot via Compose
        run: |
          docker compose run --rm \
            -e SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }} \
            light-bot
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}