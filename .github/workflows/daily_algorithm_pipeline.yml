name: Algorithm RAG Engine Pipeline

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  S3_BUCKET_NAME: hunbot-algo-rag-data
  # S3 버킷 내 실제 경로와 일치하도록 수정
  FAISS_INDEX_PATH: faiss_leetcode
  ARTIFACT_PATH: artifacts

jobs:
  heavy-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download FAISS Index from S3
        run: |
          mkdir -p indexes/faiss_leetcode
          aws s3 cp s3://${{ env.S3_BUCKET_NAME }}/${{ env.FAISS_INDEX_PATH }}/ ./indexes/faiss_leetcode/ --recursive

      - name: Run Heavy Job via Compose
        run: |
          mkdir -p artifacts
          # docker-compose.yml의 logic을 사용하기 위해 run 명령 사용
          docker-compose run --rm \
            -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            -e LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }} \
            heavy-job
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}

      - name: Upload Recommendation Map to S3
        run: |
          aws s3 sync ./artifacts s3://${{ env.S3_BUCKET_NAME }}/artifacts --delete

  light-job:
    needs: heavy-job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Artifact from S3
        run: |
          mkdir -p artifacts
          aws s3 cp s3://${{ env.S3_BUCKET_NAME }}/artifacts/recommendation_map.json ./artifacts/recommendation_map.json

      - name: Run Light Bot via Compose
        run: |
          docker-compose run --rm \
            -e SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }} \
            light-bot
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}