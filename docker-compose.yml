services:
  # -------------------------------------------------------
  # Service 1: Heavy Job (Sparse Checkout)
  # Fetches only the 'Algorithm' folder from the remote repo.
  # -------------------------------------------------------
  heavy-job:
    image: ghcr.io/Hun-Bot2/algo-heavy:latest
    build:
      context: .
      target: heavy
    volumes:
      # [Artifacts] Save the output JSON locally
      - ./artifacts:/app/artifacts
      
      # FAISS Indexes Load (Downloaded from S3 in the GitHub Action)
      - ./indexes:/app/indexes
      
      # [Cache] Persist downloaded data to speed up future runs
      - repo_cache:/app/repo
      
    environment:
      # Repository Configuration
      - REPO_URL=https://github.com/Hun-Bot2/Hun-Bot2.github.io.git
      - BRANCH_NAME=main
      
      # Target Path for Sparse Checkout
      # Note: This must match the relative path in the repo exactly
      - TARGET_FOLDER=study/docs/Algorithm/
      
      # Path for Python script to analyze
      - DATA_DIR=/app/repo/study/docs/Algorithm
      - OUTPUT_DIR=/app/artifacts

      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
      
    command: >
      sh -c "
      mkdir -p /app/repo && cd /app/repo &&
      if [ ! -d .git ]; then
        echo '[INFO] Initializing Sparse Checkout...';
        git init;
        git remote add -f origin $$REPO_URL;
        git config core.sparseCheckout true;
        echo \"$$TARGET_FOLDER\" >> .git/info/sparse-checkout;
        git pull origin $$BRANCH_NAME;
      else
        echo '[INFO] Updating existing Sparse Checkout...';
        git pull origin $$BRANCH_NAME;
      fi &&
      echo '[INFO] Starting Analysis on: ' $$DATA_DIR &&
      cd /app && python src/main/generate_index_map.py
      "

  # -------------------------------------------------------
  # Service 2: Light Bot (Slack Alert)
  # -------------------------------------------------------
  light-bot:
    build:
      context: .
      target: light
    volumes:
      - ./artifacts:/app/artifacts:ro
    environment:
      - ARTIFACT_PATH=/app/artifacts/recommendation_map.json
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}

# Define the persistent volume
volumes:
  repo_cache: